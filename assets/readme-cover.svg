<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="cover-title cover-desc">
  <title id="cover-title">NextRep 项目封面</title>
  <desc id="cover-desc">深色背景上的 NextRep 橙色双箭头标志、训练数据界面与 AI 教练卡片。</desc>

  <defs>
    <style>
      :root {
        --background: #0a0a0f;
        --surface: #141419;
        --surface-elevated: #1c1c24;
        --surface-hover: #222230;
        --accent: #ff6b2c;
        --text-primary: #f5f5f7;
        --text-secondary: #8e8e93;
        --text-tertiary: #636366;
        --border: rgba(255, 255, 255, 0.07);
        --border-strong: rgba(255, 255, 255, 0.14);
      }

      .ui-font {
        font-family: "Noto Sans CJK SC", "Noto Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .tabular {
        font-variant-numeric: tabular-nums;
      }
    </style>

    <pattern id="dot-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2.2" fill="var(--text-primary)" opacity="0.045" />
    </pattern>

    <pattern id="micro-grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.15" fill="var(--text-primary)" opacity="0.055" />
    </pattern>

    <radialGradient id="accent-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="var(--accent)" stop-opacity="0.24" />
      <stop offset="0.52" stop-color="var(--accent)" stop-opacity="0.07" />
      <stop offset="1" stop-color="var(--accent)" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="edge-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="white" stop-opacity="0.16" />
      <stop offset="0.42" stop-color="white" stop-opacity="0.03" />
      <stop offset="1" stop-color="white" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="progress-stroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="var(--accent)" stop-opacity="0.25" />
      <stop offset="0.5" stop-color="var(--accent)" />
      <stop offset="1" stop-color="var(--accent)" stop-opacity="0.55" />
    </linearGradient>

    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#000000" flood-opacity="0.55" />
    </filter>

    <filter id="accent-shadow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="var(--accent)" flood-opacity="0.28" />
    </filter>

    <clipPath id="phone-screen">
      <rect x="1038" y="92" width="400" height="716" rx="40" />
    </clipPath>
  </defs>

  <rect width="1600" height="900" fill="var(--background)" />
  <rect width="1600" height="900" fill="url(#dot-grid)" />
  <ellipse cx="1235" cy="430" rx="530" ry="520" fill="url(#accent-glow)" />

  <path d="M 0 715 C 350 628, 608 756, 852 650 C 1082 550, 1277 455, 1600 536" fill="none" stroke="var(--border)" stroke-width="2" />
  <path d="M 0 748 C 350 660, 621 788, 874 675 C 1105 572, 1297 485, 1600 560" fill="none" stroke="var(--border)" stroke-width="1" opacity="0.65" />

  <g transform="translate(118 112)" class="ui-font">
    <g filter="url(#accent-shadow)" fill="none" stroke="var(--accent)" stroke-linecap="round" stroke-linejoin="round" stroke-width="28">
      <path d="M 8 12 L 70 74 L 8 136" />
      <path d="M 84 12 L 146 74 L 84 136" />
    </g>

    <text x="0" y="285" fill="var(--text-primary)" font-size="112" font-weight="800" letter-spacing="-5">NextRep</text>
    <rect x="2" y="322" width="72" height="5" rx="2.5" fill="var(--accent)" />
    <text x="92" y="332" fill="var(--text-secondary)" font-size="19" font-weight="650" letter-spacing="4.2">LOCAL-FIRST FITNESS TRACKER</text>

    <text x="0" y="408" fill="var(--text-primary)" font-size="32" font-weight="650">本地优先的健身记录与 AI 训练建议</text>
    <text x="0" y="455" fill="var(--text-secondary)" font-size="20" font-weight="450">记录每一次训练，看见每一步进步。</text>

    <g transform="translate(0 515)">
      <g>
        <rect width="176" height="56" rx="28" fill="var(--surface-elevated)" stroke="var(--border)" />
        <circle cx="30" cy="28" r="8" fill="var(--accent)" />
        <text x="51" y="35" fill="var(--text-primary)" font-size="17" font-weight="600">训练记录</text>
      </g>
      <g transform="translate(190 0)">
        <rect width="176" height="56" rx="28" fill="var(--surface-elevated)" stroke="var(--border)" />
        <path d="M 23 35 L 29 26 L 36 31 L 44 19" fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
        <text x="55" y="35" fill="var(--text-primary)" font-size="17" font-weight="600">数据看板</text>
      </g>
      <g transform="translate(380 0)">
        <rect width="176" height="56" rx="28" fill="var(--surface-elevated)" stroke="var(--border)" />
        <path d="M 30 18 L 33 25 L 40 28 L 33 31 L 30 38 L 27 31 L 20 28 L 27 25 Z" fill="var(--accent)" />
        <text x="55" y="35" fill="var(--text-primary)" font-size="17" font-weight="600">AI 教练</text>
      </g>
    </g>

    <g transform="translate(0 645)">
      <text x="0" y="0" fill="var(--text-tertiary)" font-size="14" font-weight="600" letter-spacing="2.8">TRAIN · TRACK · EVOLVE</text>
      <path d="M 0 30 H 670" stroke="var(--border)" />
      <circle cx="0" cy="30" r="3" fill="var(--accent)" />
      <circle cx="670" cy="30" r="3" fill="var(--border-strong)" />
    </g>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="1004" y="58" width="468" height="784" rx="62" fill="var(--surface-elevated)" stroke="var(--border-strong)" stroke-width="2" />
    <rect x="1022" y="76" width="432" height="748" rx="48" fill="var(--background)" />
    <path d="M 1036 131 C 1158 77, 1365 79, 1445 179" fill="none" stroke="url(#edge-light)" stroke-width="2" opacity="0.7" />
  </g>

  <g clip-path="url(#phone-screen)" class="ui-font">
    <rect x="1038" y="92" width="400" height="716" rx="40" fill="var(--background)" />
    <rect x="1038" y="92" width="400" height="716" fill="url(#micro-grid)" opacity="0.55" />
    <rect x="1182" y="108" width="112" height="27" rx="13.5" fill="var(--surface-hover)" />

    <text x="1072" y="174" fill="var(--text-secondary)" font-size="13" font-weight="500">今天 · 保持节奏</text>
    <text x="1072" y="216" fill="var(--accent)" font-size="28" font-weight="800">下午好，</text>
    <text x="1194" y="216" fill="var(--text-primary)" font-size="28" font-weight="800">训练者</text>

    <g transform="translate(1072 246)">
      <rect width="118" height="144" rx="20" fill="var(--surface)" stroke="var(--border)" />
      <circle cx="27" cy="27" r="11" fill="var(--accent)" opacity="0.14" />
      <path d="M 27 18 C 20 27, 22 35, 27 39 C 34 35, 37 27, 31 21 C 31 27, 28 28, 27 18 Z" fill="var(--accent)" />
      <text x="17" y="66" fill="var(--text-secondary)" font-size="11" font-weight="600">燃脂</text>
      <text x="17" y="105" fill="var(--text-primary)" font-size="34" font-weight="800" class="tabular">680</text>
      <text x="18" y="126" fill="var(--text-tertiary)" font-size="10">千卡</text>
      <path d="M 18 79 H 100" stroke="var(--border)" />
    </g>

    <g transform="translate(1204 246)">
      <rect width="200" height="144" rx="20" fill="var(--surface)" stroke="var(--border)" />
      <text x="18" y="27" fill="var(--text-secondary)" font-size="11" font-weight="600">7 月训练热力图</text>
      <g transform="translate(18 46)">
        <g fill="var(--surface-hover)">
          <rect x="0" y="0" width="18" height="18" rx="5" /><rect x="24" y="0" width="18" height="18" rx="5" /><rect x="48" y="0" width="18" height="18" rx="5" /><rect x="72" y="0" width="18" height="18" rx="5" /><rect x="96" y="0" width="18" height="18" rx="5" /><rect x="120" y="0" width="18" height="18" rx="5" /><rect x="144" y="0" width="18" height="18" rx="5" />
          <rect x="0" y="24" width="18" height="18" rx="5" /><rect x="24" y="24" width="18" height="18" rx="5" /><rect x="48" y="24" width="18" height="18" rx="5" /><rect x="72" y="24" width="18" height="18" rx="5" /><rect x="96" y="24" width="18" height="18" rx="5" /><rect x="120" y="24" width="18" height="18" rx="5" /><rect x="144" y="24" width="18" height="18" rx="5" />
          <rect x="0" y="48" width="18" height="18" rx="5" /><rect x="24" y="48" width="18" height="18" rx="5" /><rect x="48" y="48" width="18" height="18" rx="5" /><rect x="72" y="48" width="18" height="18" rx="5" /><rect x="96" y="48" width="18" height="18" rx="5" /><rect x="120" y="48" width="18" height="18" rx="5" /><rect x="144" y="48" width="18" height="18" rx="5" />
        </g>
        <g fill="var(--accent)">
          <rect x="24" y="0" width="18" height="18" rx="5" opacity="0.35" />
          <rect x="72" y="0" width="18" height="18" rx="5" opacity="0.7" />
          <rect x="120" y="0" width="18" height="18" rx="5" opacity="0.45" />
          <rect x="0" y="24" width="18" height="18" rx="5" opacity="0.8" />
          <rect x="48" y="24" width="18" height="18" rx="5" opacity="0.52" />
          <rect x="96" y="24" width="18" height="18" rx="5" />
          <rect x="144" y="24" width="18" height="18" rx="5" opacity="0.62" />
          <rect x="24" y="48" width="18" height="18" rx="5" opacity="0.5" />
          <rect x="72" y="48" width="18" height="18" rx="5" opacity="0.85" />
          <rect x="120" y="48" width="18" height="18" rx="5" opacity="0.4" />
        </g>
      </g>
      <text x="18" y="130" fill="var(--text-tertiary)" font-size="10">稳定积累，比短暂爆发更重要</text>
    </g>

    <g transform="translate(1072 410)">
      <rect width="332" height="208" rx="20" fill="var(--surface)" stroke="var(--border)" />
      <text x="18" y="32" fill="var(--text-primary)" font-size="17" font-weight="700">今日训练</text>
      <rect x="258" y="15" width="58" height="28" rx="14" fill="var(--accent)" opacity="0.12" />
      <text x="273" y="34" fill="var(--accent)" font-size="11" font-weight="700">3 项</text>

      <g transform="translate(18 57)">
        <rect width="296" height="42" rx="12" fill="var(--surface-elevated)" />
        <circle cx="22" cy="21" r="9" fill="var(--accent)" opacity="0.15" />
        <path d="M 16 21 H 28 M 18 17 V 25 M 26 17 V 25" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" />
        <text x="43" y="18" fill="var(--text-primary)" font-size="12" font-weight="650">杠铃卧推</text>
        <text x="43" y="33" fill="var(--text-tertiary)" font-size="9">胸部 · 力量</text>
        <text x="232" y="26" fill="var(--text-secondary)" font-size="11" font-weight="600" class="tabular">80 kg · 4×8</text>
      </g>

      <g transform="translate(18 107)">
        <rect width="296" height="42" rx="12" fill="var(--surface-elevated)" />
        <circle cx="22" cy="21" r="9" fill="var(--accent)" opacity="0.15" />
        <path d="M 17 15 C 22 17, 22 25, 27 27 M 18 27 C 23 25, 23 17, 28 15" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" />
        <text x="43" y="18" fill="var(--text-primary)" font-size="12" font-weight="650">深蹲</text>
        <text x="43" y="33" fill="var(--text-tertiary)" font-size="9">腿部 · 力量</text>
        <text x="224" y="26" fill="var(--text-secondary)" font-size="11" font-weight="600" class="tabular">100 kg · 5×5</text>
      </g>

      <g transform="translate(18 157)">
        <rect width="296" height="34" rx="12" fill="var(--surface-elevated)" />
        <circle cx="22" cy="17" r="9" fill="var(--accent)" opacity="0.15" />
        <path d="M 17 20 C 20 13, 24 12, 28 16" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" />
        <text x="43" y="22" fill="var(--text-primary)" font-size="12" font-weight="650">跑步</text>
        <text x="241" y="22" fill="var(--text-secondary)" font-size="11" font-weight="600" class="tabular">30 min</text>
      </g>
    </g>

    <g transform="translate(1072 642)">
      <rect width="332" height="83" rx="20" fill="var(--surface)" stroke="var(--border)" />
      <text x="18" y="28" fill="var(--text-secondary)" font-size="10" font-weight="600">本周训练容量</text>
      <text x="18" y="61" fill="var(--text-primary)" font-size="28" font-weight="800" class="tabular">12.4</text>
      <text x="82" y="61" fill="var(--text-tertiary)" font-size="11">t</text>
      <path d="M 127 59 C 159 54, 176 63, 204 43 C 229 26, 251 37, 284 18" fill="none" stroke="url(#progress-stroke)" stroke-width="4" stroke-linecap="round" />
      <circle cx="284" cy="18" r="6" fill="var(--accent)" />
      <circle cx="284" cy="18" r="12" fill="var(--accent)" opacity="0.12" />
    </g>

    <g transform="translate(1118 754)">
      <circle cx="0" cy="0" r="7" fill="var(--accent)" />
      <circle cx="80" cy="0" r="7" fill="var(--text-tertiary)" opacity="0.6" />
      <circle cx="160" cy="0" r="7" fill="var(--text-tertiary)" opacity="0.6" />
      <circle cx="240" cy="0" r="7" fill="var(--text-tertiary)" opacity="0.6" />
    </g>
  </g>

  <g transform="translate(842 594)" filter="url(#soft-shadow)" class="ui-font">
    <rect width="286" height="176" rx="24" fill="var(--surface-elevated)" stroke="var(--border-strong)" />
    <rect x="18" y="18" width="42" height="42" rx="14" fill="var(--accent)" opacity="0.13" />
    <path d="M 39 25 L 42 34 L 51 37 L 42 40 L 39 49 L 36 40 L 27 37 L 36 34 Z" fill="var(--accent)" />
    <text x="74" y="36" fill="var(--text-primary)" font-size="15" font-weight="700">AI 教练</text>
    <text x="74" y="55" fill="var(--text-tertiary)" font-size="10">基于近期训练与身体状态</text>
    <path d="M 18 75 H 268" stroke="var(--border)" />
    <text x="18" y="110" fill="var(--text-primary)" font-size="17" font-weight="700">状态在线，今天可以稳步推进</text>
    <text x="18" y="139" fill="var(--text-secondary)" font-size="12">控制节奏，优先保证动作质量。</text>
    <rect x="18" y="153" width="94" height="4" rx="2" fill="var(--accent)" />
    <rect x="118" y="153" width="150" height="4" rx="2" fill="var(--surface-hover)" />
  </g>

  <g opacity="0.9" filter="url(#accent-shadow)" fill="none" stroke="var(--accent)" stroke-linecap="round" stroke-linejoin="round" stroke-width="18">
    <path d="M 1496 696 L 1534 734 L 1496 772" />
    <path d="M 1542 696 L 1580 734 L 1542 772" />
  </g>
</svg>
